name: Release By Tag

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag, e.g. v1.0.90"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Parse release tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            TAG="${GITHUB_REF_NAME}"
          else
            TAG="${{ inputs.release_tag }}"
          fi

          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid tag format: $TAG (expected vX.Y.Z)"
            exit 1
          fi

          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Validate manifest version
        shell: bash
        run: |
          MANIFEST_VERSION="$(node -p "require('./manifest.json').version")"
          if [ "$MANIFEST_VERSION" != "${{ steps.tag.outputs.version }}" ]; then
            echo "Version mismatch: manifest=$MANIFEST_VERSION, tag=${{ steps.tag.outputs.version }}"
            exit 1
          fi

      - name: Extract release notes from CHANGELOG
        shell: bash
        run: |
          VERSION="${{ steps.tag.outputs.version }}"
          awk -v header="## v${VERSION}" '
            BEGIN { found=0 }
            index($0, header) == 1 { found=1; print; next }
            $0 ~ /^## v[0-9]+\.[0-9]+\.[0-9]+([[:space:]]|$)/ && found==1 { exit }
            found==1 { print }
          ' CHANGELOG.md > RELEASE_NOTES.md

          if [ ! -s RELEASE_NOTES.md ]; then
            echo "Cannot find release notes block for v${VERSION} in CHANGELOG.md"
            exit 1
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: false
